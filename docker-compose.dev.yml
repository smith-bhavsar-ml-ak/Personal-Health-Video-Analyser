services:
  backend:
    build: ./backend
    container_name: phva-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - ./backend:/app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DATABASE_URL=sqlite:////app/data/phva.db
      - ENV=development
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:20-alpine
    container_name: phva-frontend-dev
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend

volumes:
  sqlite_data:
