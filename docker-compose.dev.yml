services:
  postgres:
    image: postgres:16-alpine
    container_name: phva-postgres-dev
    environment:
      POSTGRES_DB: phva
      POSTGRES_USER: phva
      POSTGRES_PASSWORD: phva_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phva"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: phva-backend-dev
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://phva:phva_dev@postgres:5432/phva
      - ENV=development
      - SECRET_KEY=dev-secret-key-change-in-production
      - ALLOWED_ORIGINS=http://localhost:3000
      # Set GROQ_API_KEY in your shell or a .env file:  export GROQ_API_KEY=gsk_...
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-llama-3.1-8b-instant}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
