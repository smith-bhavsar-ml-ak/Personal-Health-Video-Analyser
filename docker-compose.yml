services:
  backend:
    build: ./backend
    container_name: phva-backend
    ports:
      - "8000:8000"
    volumes:
      - sqlite_data:/app/data
      - ./backend:/app
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DATABASE_URL=sqlite:////app/data/phva.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: phva-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
