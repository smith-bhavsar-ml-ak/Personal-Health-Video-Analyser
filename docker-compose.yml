services:
  postgres:
    image: postgres:16-alpine
    container_name: phva-postgres
    environment:
      POSTGRES_DB: phva
      POSTGRES_USER: phva
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phva"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: phva-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql://phva:${POSTGRES_PASSWORD}@postgres:5432/phva
      - ENV=development
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LLM_MODEL=${LLM_MODEL}
      - LLM_TIMEOUT=${LLM_TIMEOUT:-30}
      - MAX_VIDEO_SIZE_MB=${MAX_VIDEO_SIZE_MB}
      - ANALYZE_RATE_LIMIT=${ANALYZE_RATE_LIMIT}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      postgres:
        condition: service_healthy

  flutter-web:
    build:
      context: ./app
      args:
        API_BASE: ${API_BASE:-}
    container_name: phva-flutter-web
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: phva-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - flutter-web

volumes:
  postgres_data:
