name: phva
description: Personal Health Video Analyzer – web, iOS, and Android from one codebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  flutter_riverpod: ^2.5.0

  # HTTP
  dio: ^5.4.0

  # Camera & video
  camera: ^0.11.0
  image_picker: ^1.1.0
  video_player: ^2.8.0

  # Audio (voice assistant)
  record: ^5.1.0
  audioplayers: ^6.0.0

  # Secure storage
  flutter_secure_storage: ^9.0.0

  # Permissions
  permission_handler: ^11.3.0

  # Web interop
  web: ^1.1.0

  # Utils
  path_provider: ^2.1.0
  intl: ^0.19.0
  google_fonts: ^6.2.0

  # Charts
  fl_chart: ^0.68.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
