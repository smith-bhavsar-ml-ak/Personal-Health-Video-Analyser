name: phva
description: Personal Health Video Analyzer – web, iOS, and Android from one codebase.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State management
  flutter_riverpod: ^2.5.1

  # HTTP
  dio: ^5.4.0

  # Camera & video
  camera: ^0.12.0
  image_picker: ^1.1.0
  video_player: ^2.8.0

  # Audio (voice assistant)
  record: ^6.2.0
  audioplayers: ^6.0.0

  # Secure storage
  flutter_secure_storage: ^10.0.0

  # Permissions
  permission_handler: ^12.0.1

  # Web interop
  web: ^1.1.0

  # Utils
  path_provider: ^2.1.0
  intl: ^0.20.2
  google_fonts: ^8.0.2

  # Charts
  fl_chart: ^1.2.0

  # Sharing
  share_plus: ^12.0.1

  # Activity tracking (pedometer + GPS)
  pedometer: ^4.0.2
  geolocator: ^14.0.0

  # Render widget to image (share card)
  screenshot: ^3.0.0

  # Local preferences (step goal, settings)
  shared_preferences: ^2.3.0

  # iOS HealthKit / Android Health Connect integration
  health: ^12.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
