server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — deep links (e.g. /history, /sessions/:id) resolve to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache for Flutter web assets (filenames include content hashes)
    location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No-cache for index.html (ensures updated app version is served)
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
