upstream backend {
    server backend:8000;
}

upstream flutter_web {
    server flutter-web:80;
}

server {
    listen 80;
    server_name _;

    # Allow large video uploads
    client_max_body_size 200M;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript application/x-javascript text/xml application/wasm;
    gzip_min_length 1024;

    # API → FastAPI backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow enough time for large uploads + quick background-task acknowledgement
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Flutter web SPA — proxy to flutter-web container.
    # SPA routing (try_files → index.html) handled inside flutter-web nginx.
    location / {
        proxy_pass http://flutter_web;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
