upstream backend {
    server backend:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    # Allow large video uploads
    client_max_body_size 200M;

    # Gzip compression
    gzip on;
    gzip_types text/plain application/json text/css application/javascript application/x-javascript text/xml;
    gzip_min_length 1024;

    # API → FastAPI backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Allow enough time for large uploads + quick background-task acknowledgement
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
    }

    # Frontend → Next.js
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket support (Next.js dev HMR / potential future use)
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
