# This file is intentionally minimal — each service has its own railway.toml
# in its subdirectory.
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  SERVICE          │ Root Directory │ railway.toml location          │
# ├─────────────────────────────────────────────────────────────────────┤
# │  Backend (FastAPI) │  /backend      │  backend/railway.toml          │
# │  Flutter Web       │  /app          │  app/railway.toml              │
# └─────────────────────────────────────────────────────────────────────┘
#
# In the Railway dashboard for EACH service:
#   Settings → Source → Root Directory → set to /backend or /app
