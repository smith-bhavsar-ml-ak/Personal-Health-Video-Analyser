# Railway deployment configuration
# ─────────────────────────────────────────────────────────────────────────────
# This repo deploys as TWO Railway services from a single GitHub repository.
#
# SERVICE 1 — Backend (this file, root of repo)
#   Railway dashboard → New Service → GitHub repo → set root to /
#   Dockerfile: backend/Dockerfile
#
# SERVICE 2 — Web (app/railway.toml)
#   Railway dashboard → New Service → GitHub repo → set root to /app
#   Dockerfile: app/Dockerfile
#
# ─────────────────────────────────────────────────────────────────────────────

[build]
builder          = "dockerfile"
dockerfilePath   = "backend/Dockerfile"

[deploy]
# Railway injects $PORT — uvicorn must bind to it (not hardcoded 8000)
startCommand     = "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath  = "/api/v1/health"
healthcheckTimeout = 300
restartPolicyType        = "on_failure"
restartPolicyMaxRetries  = 3

# ── Required environment variables (set in Railway dashboard) ─────────────────
# SECRET_KEY          = <random 32-char string>
# GROQ_API_KEY        = gsk_...   (from console.groq.com)
# DATABASE_URL        = postgresql://...  (auto-injected by Railway Postgres addon)
# ALLOWED_ORIGINS     = https://<your-web-service>.railway.app
# LLM_MODEL           = llama-3.1-8b-instant   (optional, this is the default)
